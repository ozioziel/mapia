name: Build Android APK

# Compila la APK de release del frontend Flutter (carpeta mapiafrontend).
# Se dispara al hacer push a main que toque el frontend, o manualmente.

on:
  push:
    branches: [main]
    paths:
      - 'mapiafrontend/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'URL base del backend'
        required: false
        default: 'http://144.22.43.169:3001/api/v1'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mapiafrontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Usa el ÚLTIMO Flutter stable porque tu config Android es AGP 9 / Gradle 9 / Kotlin 2.3,
      # que solo soportan versiones recientes de Flutter. Si prefieres fijar una versión exacta,
      # cambia `channel: stable` por `flutter-version: 'X.Y.Z'`.
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: |
          flutter clean
          flutter pub get

      - name: Compilar APK (release)
        run: >
          flutter build apk --release
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'http://144.22.43.169:3001/api/v1' }}
          --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Publicar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: mapia-release-apk
          path: mapiafrontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
